name: CI-CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:

    # 📥 Checkout Code
    - name: Checkout Code
      uses: actions/checkout@v3

    # 🔨 Build Docker Image
    - name: Build Docker Image
      run: |
        echo "Building Docker image..."
        docker build -t nginx-devops-demo .

    - name: Test Container
      run: |
        echo "Testing container..."
    
        docker run -d -p 8080:80 --name test-container nginx-devops-demo
    
        echo "Waiting for container to start..."
        sleep 10
    
        echo "Checking response..."
        curl -v http://localhost:8080
    
        echo "Validating content..."
        curl http://localhost:8080 | grep "Hello"
    
        docker rm -f test-container

    # 🚀 Deploy to EC2
    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ec2-user
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          set -e
          set -x
        
          echo "Connected to EC2"
        
          sudo yum update -y
          sudo yum install -y docker git
          sudo systemctl start docker
          sudo systemctl enable docker
        
          cd /home/ec2-user
        
          # Force clean state
          rm -rf nginx-devops-demo
        
          echo "Cloning repo..."
          GIT_ASKPASS=true git clone https://github.com/rajatdevops1/nginx-devops-demo.git
        
          cd nginx-devops-demo
        
          echo "Stopping old container..."
          sudo docker rm -f nginx-container || true
        
          echo "Building new image..."
          sudo docker build -t nginx-devops-demo .
        
          echo "Starting new container..."
          sudo docker run -d -p 80:80 --name nginx-container nginx-devops-demo
        
          sudo docker ps -a
